add_newline = true
scan_timeout = 30
command_timeout = 500
palette = "tokyo_night"

format = """
$directory\
$git_branch\
$git_status\
$git_state\
$git_metrics\
$docker_context\
$kubernetes\
$python\
$nodejs\
$golang\
$rust
$character"""

right_format = "$status$cmd_duration"

[palettes.tokyo_night]
blue = "#7aa2f7"
green = "#9ece6a"
orange = "#ff9e64"
purple = "#bb9af7"
yellow = "#e0af68"
red = "#f7768e"
fg = "#c0caf5"
muted = "#565f89"

[directory]
style = "blue"
format = "[$path]($style) "
truncation_length = 3
truncate_to_repo = false
read_only = "ro"
read_only_style = "yellow"

[git_branch]
symbol = "git:"
style = "purple"
format = "[$symbol$branch]($style) "
truncation_length = 32
truncation_symbol = "..."

[git_status]
style = "yellow"
format = "[$all_status$ahead_behind]($style) "
conflicted = "="
ahead = ">"
behind = "<"
diverged = "<>"
up_to_date = ""
untracked = "?"
stashed = "$"
modified = "!"
staged = "+"
renamed = "r"
deleted = "x"

[git_state]
style = "red"
format = "[\\($state( $progress_current/$progress_total)\\)]($style) "

[git_metrics]
disabled = false
added_style = "green"
deleted_style = "red"
format = "[+$added]($added_style)[ -$deleted]($deleted_style) "

[character]
success_symbol = "[❯](blue)"
error_symbol = "[❯](red)"
vimcmd_symbol = "[❮](green)"

[cmd_duration]
min_time = 2000
style = "yellow"
format = "[$duration]($style)"
show_milliseconds = false

[status]
disabled = false
style = "red"
format = "[x$status]($style) "

[python]
symbol = "py "
style = "green"
format = "[$symbol$version]($style) "
detect_files = ["pyproject.toml", "requirements.txt", ".python-version", "Pipfile", "tox.ini", ".venv", "venv"]
detect_extensions = ["py"]

[nodejs]
symbol = "node "
style = "green"
format = "[$symbol$version]($style) "
detect_files = ["package.json", ".node-version", ".nvmrc"]

[package]
disabled = false
symbol = "pkg "
style = "yellow"
format = "[$symbol$version]($style) "

[docker_context]
disabled = false
symbol = "docker "
style = "blue"
format = "[$symbol$context]($style) "
only_with_files = false

[kubernetes]
disabled = false
symbol = "k8s "
style = "purple"
format = '[$symbol$context( \($namespace\))]($style) '
contexts = [
  { context_pattern = ".*prod.*", style = "red" },
  { context_pattern = ".*stg.*|.*stage.*", style = "yellow" },
]

[golang]
symbol = "go "
style = "green"
format = "[$symbol$version]($style) "
detect_files = ["go.mod", "go.sum", ".go-version"]

[rust]
symbol = "rs "
style = "orange"
format = "[$symbol$version]($style) "
detect_files = ["Cargo.toml", "Cargo.lock", "rust-toolchain", "rust-toolchain.toml"]

[aws]
disabled = true

[gcloud]
disabled = true

[terraform]
disabled = true

[time]
disabled = true
