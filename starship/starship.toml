add_newline = true
scan_timeout = 30
command_timeout = 500
palette = "tokyo_night"

# Left prompt keeps the existing module order while making the powerline joins explicit.
format = """
$directory\
$git_branch\
$git_status\
$git_state\
$git_metrics\
$docker_context\
$kubernetes\
$python\
$nodejs\
$golang\
$rust\
$package
$character"""

# Right prompt stays capsule-shaped and independent from the left powerline chain.
right_format = "$status$cmd_duration"

[palettes.tokyo_night]
bg = "#1a1b26"
surface = "#24283b"
fg = "#c0caf5"
muted = "#565f89"
blue = "#7aa2f7"
cyan = "#7dcfff"
teal = "#73daca"
green = "#9ece6a"
orange = "#ff9e64"
purple = "#bb9af7"
yellow = "#e0af68"
red = "#f7768e"

[directory]
style = "fg:bg bg:blue"
format = "[ $path ]($style)"
truncation_length = 3
truncate_to_repo = false
read_only = " ůįĆĺ"
read_only_style = "fg:bg bg:yellow"

[git_branch]
symbol = "Ôźė"
style = "fg:bg bg:purple"
format = "[Óāį](fg:blue bg:purple)[ $symbol $branch ]($style)"
truncation_length = 32
truncation_symbol = "..."

[git_status]
style = "fg:yellow bg:surface"
format = "([Óāį](fg:purple bg:surface)[ $all_status$ahead_behind ]($style))"
conflicted = "="
ahead = ">"
behind = "<"
diverged = "<>"
up_to_date = ""
untracked = "?"
stashed = "$"
modified = "!"
staged = "+"
renamed = "r"
deleted = "x"

[git_state]
style = "fg:red bg:surface"
format = "([ $state( $progress_current/$progress_total) ]($style))"

[git_metrics]
disabled = false
added_style = "fg:green bg:surface"
deleted_style = "fg:red bg:surface"
format = "([+$added]($added_style)[ -$deleted ]($deleted_style))"

[docker_context]
disabled = false
symbol = "ÔĆą"
style = "fg:bg bg:teal"
format = "[Óāį](fg:surface bg:teal)[ $symbol $context ]($style)"
only_with_files = false

[kubernetes]
disabled = false
symbol = "ůĪÉĺ"
style = "fg:bg bg:orange"
format = '[Óāį](fg:teal bg:orange)[ $symbol $context( \($namespace\)) ]($style)'
contexts = [
  { context_pattern = ".*prod.*", style = "fg:bg bg:red" },
  { context_pattern = ".*stg.*|.*stage.*", style = "fg:bg bg:yellow" },
]

[python]
symbol = "ÓėÜ"
style = "fg:bg bg:green"
format = "[Óāį](fg:orange bg:green)[ $symbol $version ]($style)"
detect_files = [
  "pyproject.toml",
  "requirements.txt",
  ".python-version",
  "Pipfile",
  "tox.ini",
  ".venv",
  "venv",
]
detect_extensions = ["py"]

[nodejs]
symbol = "Óúė"
style = "fg:bg bg:cyan"
format = "[Óāį](fg:green bg:cyan)[ $symbol $version ]($style)"
detect_files = [
  "package.json",
  ".node-version",
  ".nvmrc",
]

[golang]
symbol = "Óėß"
style = "fg:bg bg:blue"
format = "[Óāį](fg:cyan bg:blue)[ $symbol $version ]($style)"
detect_files = [
  "go.mod",
  "go.sum",
  ".go-version",
]

[rust]
symbol = "Óě®"
style = "fg:bg bg:orange"
format = "[Óāį](fg:blue bg:orange)[ $symbol $version ]($style)"
detect_files = [
  "Cargo.toml",
  "Cargo.lock",
  "rust-toolchain",
  "rust-toolchain.toml",
]

[package]
disabled = false
symbol = "ůįŹó"
style = "fg:bg bg:yellow"
format = "[Óāį](fg:orange bg:yellow)[ $symbol $version ]($style)"

[character]
success_symbol = "[‚ĚĮ](blue)"
error_symbol = "[‚ĚĮ](red)"
vimcmd_symbol = "[‚Ěģ](green)"

[status]
disabled = false
symbol = "‚úė"
style = "fg:bg bg:red"
format = "[Óā∂](red)[ $symbol$status ]($style)[Óāī](red)"

[cmd_duration]
min_time = 2000
style = "fg:bg bg:yellow"
format = "[Óā∂](yellow)[ ůįĒõ $duration ]($style)[Óāī](yellow)"
show_milliseconds = false

[aws]
disabled = true

[gcloud]
disabled = true

[terraform]
disabled = true

[time]
disabled = true
